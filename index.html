<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HatoRay | Official Links</title>
    <style>
        /* 基礎設定與動態背景 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', 'Inter', sans-serif;
            background: #050505;
            color: white;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%);
            z-index: -1;
        }

        /* 裝飾性霓虹光暈 */
        .neon-glow {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: rgba(138, 43, 226, 0.2);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
        }

        .container {
            max-width: 400px;
            width: 90%;
            padding: 60px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* 藝術頭像設定 */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid #8a2be2;
            margin-bottom: 25px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
            transition: transform 0.5s ease;
        }

        .profile-pic:hover {
            transform: rotate(5deg) scale(1.05);
        }

        .name {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bio {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 45px;
            line-height: 1.6;
            letter-spacing: 1px;
            text-align: center; /* 確保文字置中 */
        }

        /* 藝術感按鈕設計 */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .link-btn {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(138, 43, 226, 0.3);
            color: white;
            padding: 18px;
            border-radius: 2px; /* 銳利的方型邊角增加藝術感 */
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(138, 43, 226, 0.2), transparent);
            transition: 0.5s;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn:hover {
            background: rgba(138, 43, 226, 0.1);
            border-color: #8a2be2;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.3);
            transform: translateY(-3px);
        }

        /* 重點推薦平台：帶有發光效果 */
        .cta-btn {
            border: 1px solid #00d2ff;
            background: rgba(0, 210, 255, 0.05);
        }

        .cta-btn:hover {
            border-color: #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        .footer {
            margin-top: 80px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="neon-glow"></div>

    <div class="container">
        <img src="進巨艾倫.jpg" alt="HatoRay" class="profile-pic">
        
        <div class="name">HatoRay</div>
        <div class="bio">Artists<br>Ultimate Sensory Experience</div>

        <div class="links">
            <a href="https://www.facebook.com/profile.php?id=61581091841365" target="_blank" class="link-btn">Facebook</a>
            <a href="https://www.instagram.com/hatoray123/" target="_blank" class="link-btn">Instagram</a>
            <a href="https://www.threads.com/@hatoray123" target="_blank" class="link-btn">Threads</a>
            <a href="https://x.com/HatoRay_XXX" target="_blank" class="link-btn">X Platform</a>
            <a href="https://www.tiktok.com/@hatoray0" target="_blank" class="link-btn">TikTok</a>
            
            <a href="https://pmvhaven.com/profile" target="_blank" class="link-btn cta-btn">PMV Haven</a>
            <a href="https://fansly.com/hatoray/posts" target="_blank" class="link-btn cta-btn">Fansly (Exclusive)</a>
        </div>

        <div class="footer">
            © 2026 HatoRay. All Rights Reserved.
        </div>
    </div>

</body>
</html>
