<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HatoRay | Artists</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 銀翼殺手 2049 色調：深棕黑、橘紅霓虹、青色光芒 */
        :root {
            --br-orange: #ff6600;
            --br-cyan: #00f0ff;
            --br-black: #0a0505;
        }

        body, html {
            margin: 0; padding: 0; min-height: 100%;
            background-color: var(--br-black);
            color: white; font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center;
        }

        /* 響應式背景圖片設定 */
        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* 請將你的背景圖片上傳到 GitHub 並在此替換檔名 */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('YOUR_BG_IMAGE.jpg') no-repeat center center/cover;
            z-index: -1;
            filter: saturate(1.2) contrast(1.1);
        }

        .container {
            max-width: 500px; width: 90%;
            padding: 60px 0; display: flex; flex-direction: column; align-items: center;
        }

        /* 2049 質感頭像 */
        .profile-pic {
            width: 130px; height: 130px; border-radius: 50%;
            border: 2px solid var(--br-orange); margin-bottom: 25px;
            object-fit: cover; box-shadow: 0 0 30px rgba(255, 102, 0, 0.4);
        }

        .name {
            font-size: 2.4rem; font-weight: 900; letter-spacing: 8px;
            margin-bottom: 10px; text-transform: uppercase;
            text-shadow: 0 0 10px var(--br-orange);
            color: white;
        }

        .bio {
            font-size: 0.9rem; color: rgba(255, 255, 255, 0.8);
            margin-bottom: 50px; line-height: 1.8;
            text-align: center; letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 網格佈局：確保手機與電腦順暢切換 */
        .links-grid { width: 100%; display: flex; flex-direction: column; gap: 40px; }

        .row { display: grid; width: 100%; gap: 15px; }
        
        /* 4 欄網格 */
        .row-4 { grid-template-columns: repeat(4, 1fr); }
        
        /* 3 欄網格 */
        .row-3 { grid-template-columns: repeat(3, 1fr); }

        .link-item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: white; transition: all 0.4s ease;
        }

        /* 圖示使用青色 (Cyber-Cyan) */
        .link-item i {
            font-size: 1.8rem; margin-bottom: 12px;
            color: var(--br-cyan);
            filter: drop-shadow(0 0 5px var(--br-cyan));
        }

        .link-item span {
            font-size: 0.65rem; font-weight: 600;
            letter-spacing: 1.5px; text-transform: uppercase;
            opacity: 0.7;
        }

        /* Hover 特效：光影流動 */
        .link-item:hover { transform: scale(1.1); }
        .link-item:hover i { color: #fff; filter: drop-shadow(0 0 15px var(--br-cyan)); }
        .link-item:hover span { opacity: 1; text-shadow: 0 0 5px white; }

        .footer {
            margin-top: 100px; font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.2); letter-spacing: 3px;
        }

        /* 手機版微調：確保小螢幕不撕裂 */
        @media (max-width: 400px) {
            .name { font-size: 1.8rem; letter-spacing: 5px; }
            .link-item i { font-size: 1.5rem; }
            .link-item span { font-size: 0.55rem; }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <img src="進巨艾倫.jpg" alt="HatoRay" class="profile-pic">
        
        <div class="name">HatoRay</div>
        <div class="bio">Artists<br>Ultimate Sensory Experience</div>

        <div class="links-grid">
            <div class="row row-4">
                <a href="https://www.facebook.com/profile.php?id=61581091841365" target="_blank" class="link-item">
                    <i class="fa-brands fa-facebook-f"></i><span>Facebook</span>
                </a>
                <a href="https://www.instagram.com/hatoray123/" target="_blank" class="link-item">
                    <i class="fa-brands fa-instagram"></i><span>Instagram</span>
                </a>
                <a href="https://www.threads.com/@hatoray123" target="_blank" class="link-item">
                    <i class="fa-brands fa-threads"></i><span>Threads</span>
                </a>
                <a href="https://x.com/HatoRay_XXX" target="_blank" class="link-item">
                    <i class="fa-brands fa-x-twitter"></i><span>X Platform</span>
                </a>
            </div>

            <div class="row row-3">
                <a href="https://www.tiktok.com/@hatoray0" target="_blank" class="link-item">
                    <i class="fa-brands fa-tiktok"></i><span>TikTok</span>
                </a>
                <a href="https://pmvhaven.com/profile" target="_blank" class="link-item">
                    <i class="fa-solid fa-cloud"></i><span>PMV Haven</span>
                </a>
                <a href="https://fansly.com/hatoray/posts" target="_blank" class="link-item">
                    <i class="fa-solid fa-bolt"></i><span>Fansly</span>
                </a>
            </div>
        </div>

        <div class="footer">© 2026 HATO RAY DESIGN.</div>
    </div>
</body>
</html>
