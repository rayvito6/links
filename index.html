<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HatoRay | Official Links</title>
    <style>
        /* 基礎設定 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }

        /* 背景：建議放一張經過 AI 藝術處理後的圖片 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964') no-repeat center center/cover;
            z-index: -1;
            filter: blur(10px);
        }

        /* 內容容器 */
        .container {
            max-width: 450px;
            margin: 0 auto;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* 大頭照 */
        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .name {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .bio {
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 40px;
            line-height: 1.5;
        }

        /* 按鈕列表 */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 玻璃質感按鈕 */
        .link-btn {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 16px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: scale(1.03);
        }

        /* 特別突出的 CTA 按鈕 (Fansly/PMV Haven) */
        .cta-btn {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            border: none;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        .footer {
            margin-top: 60px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <img src="https://via.placeholder.com/150" alt="HatoRay" class="profile-pic">
        
        <div class="name">HatoRay</div>
        <div class="bio">藝術家 提供極致感官體驗</div>

        <div class="links">
            <a href="https://www.facebook.com/profile.php?id=61581091841365" target="_blank" class="link-btn">Facebook</a>
            <a href="https://www.instagram.com/hatoray123/" target="_blank" class="link-btn">Instagram</a>
            <a href="https://www.threads.com/@hatoray123" target="_blank" class="link-btn">Threads</a>
            <a href="https://x.com/HatoRay_XXX" target="_blank" class="link-btn">X (Twitter)</a>
            <a href="https://www.tiktok.com/@hatoray0" target="_blank" class="link-btn">TikTok</a>
            
            <a href="https://pmvhaven.com/profile" target="_blank" class="link-btn cta-btn">PMV Haven</a>
            <a href="https://fansly.com/hatoray/posts" target="_blank" class="link-btn cta-btn">Exclusive (Fansly)</a>
        </div>

        <div class="footer">
            © 2026 HatoRay. All Rights Reserved.
        </div>
    </div>

</body>
</html>
